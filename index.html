<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe</title>
        <link href="styles.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <div class="container">
            <h1 class="turn">Current Turn: Player 1 X</h1>
            <div class="board"></div>
            <div class="buttons">
                <button class="reset">Reset</button>
            </div>
            <form id="player-form">
                <div>
                <label for="player1">Player 1 Name:</label>
                <input type="text" id="player1" name="player1" placeholder="Enter name here">
                <button type="submit">Submit</button>
                </div>
                <div>
                <label for="player2">Player 2 Name:</label>
                <input type="text" id="player2" name="player2" placeholder="Enter name here">
                <button type="submit">Submit</button>
                </div>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
</html>
